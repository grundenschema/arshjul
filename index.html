<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grundens årshjul</title>
  <style>
    :root{
      --bg:#f5f7fb; --text:rgba(15,23,42,0.92); --muted:rgba(15,23,42,0.62);
      --border:rgba(15,23,42,0.12); --shadow:0 14px 42px rgba(15,23,42,0.10); --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 800px at 20% 20%, rgba(99,102,241,0.14), transparent 55%),
        radial-gradient(1000px 700px at 80% 30%, rgba(20,184,166,0.12), transparent 60%),
        radial-gradient(900px 650px at 60% 80%, rgba(244,114,182,0.10), transparent 55%),
        var(--bg);
      color:var(--text); min-height:100vh; overflow-x:hidden;
    }
    .topbar{padding:16px 18px 0}
    .brand{
      display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--radius);
      background:rgba(255,255,255,0.72); border:1px solid var(--border); box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
    }
    .logo{width:84px; height:auto; object-fit:contain; filter:drop-shadow(0 8px 18px rgba(15,23,42,0.12));}
    .brandTitle{font-size:20px; font-weight:900; letter-spacing:0.2px; line-height:1.1;}
    .brandSub{margin-top:3px; font-size:13px; color:var(--muted); font-weight:600;}
    .app{display:grid; grid-template-columns:1fr minmax(320px,420px); gap:18px; padding:18px; align-items:start;}
    .wheelWrap{
      position:sticky; top:18px; height:calc(100vh - 36px);
      display:grid; place-items:center; border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.60));
      border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden;
    }
    .wheelHeader{position:absolute; top:14px; left:14px; right:14px; display:flex; justify-content:space-between; gap:12px; pointer-events:none;}
    .wheelHeader .status{font-size:13px; color:var(--muted); text-align:right;}
    .wheel{
      width:min(92vmin,980px); height:min(92vmin,980px);
      max-width:calc(100% - 24px); max-height:calc(100% - 24px); display:block;
      filter:drop-shadow(0 14px 40px rgba(0,0,0,0.18));
    }
    .slice{cursor:pointer; transition:transform 120ms ease, filter 120ms ease; transform-origin:50% 50%; outline:none;}
    .slice:hover{filter:brightness(1.04)}
    .slice:active{transform:scale(0.992)}
    .slice[aria-selected="true"]{filter:brightness(1.12)}
    .slice[aria-selected="true"] path{stroke:rgba(15,23,42,0.35); stroke-width:2}
    .monthLabel{font-size:14px; font-weight:900; fill:rgba(15,23,42,0.86); letter-spacing:0.3px; user-select:none; pointer-events:none;}
    .centerDot{fill:rgba(15,23,42,0.04); stroke:rgba(15,23,42,0.14); stroke-width:1}

    .panel{
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.66));
      border:1px solid var(--border); box-shadow:var(--shadow); padding:14px;
      position:sticky; top:18px; height:calc(100vh - 36px); overflow:auto;
    }
    .controls{display:flex; gap:8px; align-items:center; margin:10px 0 6px;}
    input[type="search"], input[type="text"], textarea{
      width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border);
      background:rgba(255,255,255,0.75); color:var(--text); outline:none;
    }
    textarea{resize:vertical}
    input::placeholder{color:rgba(15,23,42,0.45)}
    .btn{padding:10px 12px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.88); color:var(--text); cursor:pointer; white-space:nowrap; font-weight:800;}
    .btn:hover{background:rgba(255,255,255,0.98)}
    .searchHelp{font-size:13px; color:var(--muted); margin-bottom:10px;}
    h2{margin:0 0 6px 0; font-size:18px; display:flex; align-items:baseline; justify-content:space-between; gap:12px;}
    .sub{margin:0 0 12px 0; color:var(--muted); font-size:13px;}
    .pill{padding:4px 8px; border-radius:999px; border:1px solid var(--border); background:rgba(15,23,42,0.04); font-size:12px;}
    .list{display:grid; gap:10px;}
    .card{border-radius:16px; border:1px solid var(--border); background:rgba(255,255,255,0.86); padding:12px;}
    .cardTop{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
    .cardTitle{font-weight:900; font-size:15px; line-height:1.2; margin:0;}
    .dangerBtn{border:1px solid rgba(239,68,68,0.35); background:rgba(239,68,68,0.12); color:rgba(15,23,42,0.92);
      border-radius:12px; padding:8px 10px; cursor:pointer; font-weight:900; line-height:1;}
    .dangerBtn:hover{background:rgba(239,68,68,0.18);}
    .ghostBtn{border:1px solid rgba(15,23,42,0.18); background:rgba(255,255,255,0.72); color:rgba(15,23,42,0.92);
      border-radius:12px; padding:8px 10px; cursor:pointer; font-weight:900; line-height:1;}
    .ghostBtn:hover{background:rgba(255,255,255,0.92);}
    .btnGroup{display:flex; gap:8px; align-items:center;}

    .meta{margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; color:var(--muted); font-size:12px;}
    .desc{margin:10px 0 0 0; color:rgba(15,23,42,0.82); font-size:13px; line-height:1.35; white-space:pre-wrap;}
    .empty{padding:14px; border:1px dashed rgba(15,23,42,0.25); border-radius:16px; color:var(--muted); background:rgba(255,255,255,0.55);}

    .modalBackdrop{position:fixed; inset:0; display:none; place-items:center; background:rgba(15,23,42,0.35); padding:18px; z-index:50;}
    .modalBackdrop[aria-hidden="false"]{display:grid;}
    .modal{width:min(720px, 100%); border-radius:18px; border:1px solid var(--border); background:rgba(255,255,255,0.92); box-shadow:var(--shadow); padding:14px;}
    .modalHeader{display:flex; align-items:center; justify-content:space-between; gap:10px; padding-bottom:8px; border-bottom:1px solid rgba(15,23,42,0.10);}
    .modalTitle{font-weight:900; font-size:16px;}
    .iconBtn{border:1px solid var(--border); background:rgba(255,255,255,0.75); color:var(--text); border-radius:12px; padding:8px 10px; cursor:pointer; font-weight:900;}
    .iconBtn:hover{background:rgba(255,255,255,0.90)}
    .field{display:grid; gap:6px; margin-top:10px;}
    .field span{font-size:12px; color:var(--muted); font-weight:800;}
    .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .modalFooter{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:12px; padding-top:10px; border-top:1px solid rgba(15,23,42,0.10);}
    .btnRow{display:flex; gap:8px;}
    .tiny{font-size:12px; color:rgba(15,23,42,0.62); line-height:1.35; margin:0;}

    @media (max-width:980px){
      .app{grid-template-columns:1fr;}
      .wheelWrap{position:relative; height:auto; padding:12px 0 6px;}
      .wheel{width:min(96vmin,860px); height:min(96vmin,860px);}
      .panel{position:relative; height:auto;}
    }
    @media (max-width:560px){.grid2{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="https://cdn.prod.website-files.com/63e24702f042c50ffc91818b/648af582da4e0285c336f459_Grunden_logotyp-vit-transparent-centered%20outline.png" alt="Grunden logotyp" />
      <div>
        <div class="brandTitle">Grundens årshjul</div>
        <div class="brandSub">Aktiviteter per månad</div>
      </div>
    </div>
  </header>

  <div class="app">
    <section class="wheelWrap" aria-label="Årshjul">
      <div class="wheelHeader">
        <div></div>
        <div class="status" id="statusText">Inte laddat</div>
      </div>
      <svg class="wheel" id="wheel" viewBox="0 0 600 600" role="img" aria-label="Årshjul med 12 månader"></svg>
    </section>

    <aside class="panel" aria-label="Aktiviteter">
      <div class="controls">
        <input id="q" type="search" placeholder="Sök aktivitet i alla månader…" autocomplete="off" />
        <button class="btn" id="clearBtn" title="Rensa sök">Rensa</button>
        <button class="btn" id="addBtn" title="Lägg till aktivitet">Ny aktivitet</button>
      </div>
      <div class="searchHelp">Skriv för att söka i alla aktiviteter. Du kan söka på rubrik, datum, plats eller månad.</div>

      <h2>
        <span id="panelTitle">Välj en månad</span>
        <span class="pill" id="countPill" style="display:none;"></span>
      </h2>
      <p class="sub" id="panelSub">Sök i rutan för att hitta aktiviteter i alla månader eller välj en månad i hjulet.</p>

      <div class="list" id="list"></div>
    </aside>
  </div>

  <div class="modalBackdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Ny aktivitet">
      <div class="modalHeader">
        <div class="modalTitle" id="modalTitle">Ny aktivitet</div>
        <button class="iconBtn" id="closeModalBtn" aria-label="Stäng">✕</button>
      </div>

      <form id="addForm">

            <input type="hidden" id="fRow" />
            <input type="hidden" id="fMode" value="add" />

        <div class="grid2">
          <label class="field">
            <span>Månad (1–12)</span>
            <input id="fMonth" required inputmode="numeric" placeholder="t.ex. 3" />
          </label>
          <label class="field">
            <span>Datum</span>
            <input id="fDate" placeholder="t.ex. 2026-03-14 eller 14 mars" />
          </label>
        </div>

        <label class="field">
          <span>Rubrik</span>
          <input id="fTitle" required placeholder="t.ex. Utflykt" />
        </label>

        <label class="field">
          <span>Beskrivning</span>
          <textarea id="fDesc" rows="4" placeholder="Beskriv kort…"></textarea>
        </label>

        <div class="grid2">
          <label class="field">
            <span>Plats (valfri)</span>
            <input id="fPlace" placeholder="t.ex. Parken" />
          </label>
          <label class="field">
            <span>Färg/kategori (valfri)</span>
            <input id="fCat" placeholder="t.ex. Idrott" />
          </label>
        </div>

        <div class="modalFooter">
          <p class="tiny" id="saveStatus"></p>
          <div class="btnRow">
            <button class="btn" type="button" id="cancelBtn">Avbryt</button>
            <button class="btn" type="submit" id="saveBtn">Spara</button>
          </div>
        </div>
      </form>
    </div>
  </div>

<script>
(() => {
  const API_URL = "https://script.google.com/macros/s/AKfycbysV-2cbtkXq_Jew54ibX9eUpWUvBaIlVCjIV_S0Z57Z0yRlY1SpaO6P5slPp_rJp9umg/exec";
  const months = ["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];
  const sliceFills = [
    "rgba(99,102,241,0.22)","rgba(244,114,182,0.20)","rgba(250,204,21,0.18)","rgba(34,197,94,0.18)",
    "rgba(168,85,247,0.18)","rgba(20,184,166,0.18)","rgba(251,146,60,0.18)","rgba(59,130,246,0.18)",
    "rgba(248,113,113,0.18)","rgba(163,230,53,0.18)","rgba(148,163,184,0.18)","rgba(129,140,248,0.18)"
  ];

  const els = {
    wheel: document.getElementById("wheel"),
    statusText: document.getElementById("statusText"),
    panelTitle: document.getElementById("panelTitle"),
    panelSub: document.getElementById("panelSub"),
    list: document.getElementById("list"),
    q: document.getElementById("q"),
    clearBtn: document.getElementById("clearBtn"),
    countPill: document.getElementById("countPill"),
    addBtn: document.getElementById("addBtn"),
    modalBackdrop: document.getElementById("modalBackdrop"),
    closeModalBtn: document.getElementById("closeModalBtn"),
    cancelBtn: document.getElementById("cancelBtn"),
    addForm: document.getElementById("addForm"),
    saveStatus: document.getElementById("saveStatus"),
    fMonth: document.getElementById("fMonth"),
    fDate: document.getElementById("fDate"),
    fTitle: document.getElementById("fTitle"),
    fDesc: document.getElementById("fDesc"),
    fPlace: document.getElementById("fPlace"),
    fCat: document.getElementById("fCat"),
    fRow: document.getElementById("fRow"),
    fMode: document.getElementById("fMode"),
    modalTitle: document.getElementById("modalTitle"),
  };

  let allRows = [];
  let selectedMonthIndex = null;

  function setStatus(msg) { els.statusText.textContent = msg; }

  function monthToIndex(m) {
    if (m == null) return null;
    const s = String(m).trim();
    if (/^\d+$/.test(s)) {
      const n = Number(s);
      if (n >= 1 && n <= 12) return n - 1;
    }
    const i = months.findIndex(x => x.toLowerCase() === s.toLowerCase());
    return i >= 0 ? i : null;
  }

  function getField(obj, key) {
    const k = Object.keys(obj).find(h => h.trim().toLowerCase() === key.trim().toLowerCase());
    return k ? obj[k] : "";
  }

  function normalizeRow(obj) {
    const monthRaw = getField(obj,"Månad") || getField(obj,"Manad") || getField(obj,"Month");
    return {
      monthIndex: monthToIndex(monthRaw),
      title: String(getField(obj,"Rubrik") || getField(obj,"Titel") || getField(obj,"Title")).trim(),
      date: String(getField(obj,"Datum") || getField(obj,"Date")).trim(),
      desc: String(getField(obj,"Beskrivning") || getField(obj,"Description")).trim(),
      place: String(getField(obj,"Plats") || getField(obj,"Location")).trim(),
      category: String(getField(obj,"Färg/kategori") || getField(obj,"Farg/kategori") || getField(obj,"Kategori") || getField(obj,"Category")).trim(),
      row: Number(getField(obj,"__row") || 0) || 0,
    };
  }

  function formatDate(d){
    if(!d) return "";
    const date = new Date(d);
    if(!isNaN(date)){
      return date.toLocaleDateString("sv-SE",{day:"numeric",month:"long"});
    }
    return d;
  }

  function jsonp(url, timeoutMs=12000) {
    return new Promise((resolve, reject) => {
      const cbName = "__arshjul_cb_" + Math.random().toString(36).slice(2);
      const u = new URL(url);
      u.searchParams.set("callback", cbName);
      u.searchParams.set("_ts", Date.now().toString());

      let done = false;
      const scriptTag = document.createElement("script");

      const cleanup = () => {
        try { delete window[cbName]; } catch {}
        if (scriptTag && scriptTag.parentNode) scriptTag.parentNode.removeChild(scriptTag);
        clearTimeout(t);
      };

      window[cbName] = (data) => {
        if (done) return;
        done = true;
        cleanup();
        resolve(data);
      };

      scriptTag.src = u.toString();
      scriptTag.onerror = () => {
        if (done) return;
        done = true;
        cleanup();
        reject(new Error("JSONP load failed"));
      };

      const t = setTimeout(() => {
        if (done) return;
        done = true;
        cleanup();
        reject(new Error("JSONP timeout"));
      }, timeoutMs);

      document.head.appendChild(scriptTag);
    });
  }

  async function fetchJsonSmart(url) {
    try {
      const u = new URL(url);
      u.searchParams.set("_ts", Date.now().toString());
      const res = await fetch(u.toString(), { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    } catch (e) {
      return await jsonp(url);
    }
  }

  async function loadData() {
    setStatus("Laddar…");
    try {
      const json = await fetchJsonSmart(API_URL);
      const arr = Array.isArray(json) ? json : [];
      allRows = arr.map(normalizeRow).filter(r => r.monthIndex !== null && r.title);
      setStatus("Laddat: " + allRows.length);
      render();
    } catch (e) {
      console.error(e);
      setStatus("Kunde inte ladda");
      els.list.innerHTML = '<div class="empty">Kunde inte hämta data. Kolla att webbappen är distribuerad med <b>Vem har åtkomst: Alla</b>.</div>';
    }
  }

  async function updateActivity(payload){
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action: "update", ...payload })
    });
  }

  async function addActivity(payload){
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(payload)
    });
  }

  async function deleteActivity(payload){
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action: "delete", ...payload })
    });
  }

  function openModal(mode="add", rowData=null){
    els.fMode.value = mode;

    if (mode === "edit" && rowData) {
      els.modalTitle.textContent = "Redigera aktivitet";
      els.saveStatus.textContent = "";
      els.fRow.value = String(rowData.row || "");
      els.fMonth.value = String((rowData.monthIndex ?? 0) + 1);
      els.fDate.value = rowData.date || "";
      els.fTitle.value = rowData.title || "";
      els.fDesc.value = rowData.desc || "";
      els.fPlace.value = rowData.place || "";
      els.fCat.value = rowData.category || "";
    } else {
      els.modalTitle.textContent = "Ny aktivitet";
      els.fRow.value = "";
      els.addForm.reset();
    }

    els.modalBackdrop.setAttribute("aria-hidden","false");
    document.body.style.overflow = "hidden";
    els.fMonth.focus();
  }

  function closeModal(){
    els.modalBackdrop.setAttribute("aria-hidden","true");
    document.body.style.overflow = "";
    els.saveStatus.textContent = "";
    els.addForm.reset();

    const q = els.q.value.trim();
    if (q) {
      els.panelTitle.textContent = "Sökresultat";
      els.panelSub.textContent = "Träffar i alla månader (månad visas på varje aktivitet).";
    } else if (selectedMonthIndex === null) {
      els.panelTitle.textContent = "Välj en månad";
      els.panelSub.textContent = "Sök i rutan för att hitta aktiviteter i alla månader eller välj en månad i hjulet.";
    } else {
      els.panelTitle.textContent = months[selectedMonthIndex];
      els.panelSub.textContent = "Aktiviteter för vald månad.";
    }
  }

  function polarToCartesian(cx, cy, r, angleDeg) {
    const a = (angleDeg - 90) * Math.PI / 180.0;
    return { x: cx + (r * Math.cos(a)), y: cy + (r * Math.sin(a)) };
  }

  function describeArc(cx, cy, rOuter, rInner, startAngle, endAngle) {
    const startOuter = polarToCartesian(cx, cy, rOuter, endAngle);
    const endOuter = polarToCartesian(cx, cy, rOuter, startAngle);
    const startInner = polarToCartesian(cx, cy, rInner, startAngle);
    const endInner = polarToCartesian(cx, cy, rInner, endAngle);
    const largeArc = (endAngle - startAngle) <= 180 ? "0" : "1";
    return ["M", startOuter.x, startOuter.y,
      "A", rOuter, rOuter, 0, largeArc, 0, endOuter.x, endOuter.y,
      "L", startInner.x, startInner.y,
      "A", rInner, rInner, 0, largeArc, 1, endInner.x, endInner.y,
      "Z"].join(" ");
  }

  function buildWheel() {
    const svg = els.wheel;
    svg.innerHTML = "";
    const cx = 300, cy = 300, rOuter = 265, rInner = 92, sliceAngle = 360/12;

    const ring = document.createElementNS("http://www.w3.org/2000/svg","circle");
    ring.setAttribute("cx", cx); ring.setAttribute("cy", cy); ring.setAttribute("r", rOuter + 8);
    ring.setAttribute("fill","rgba(15,23,42,0.03)");
    ring.setAttribute("stroke","rgba(15,23,42,0.08)");
    ring.setAttribute("stroke-width","2");
    svg.appendChild(ring);

    for (let i=0;i<12;i++) {
      const start = i*sliceAngle, end = start + sliceAngle;

      const g = document.createElementNS("http://www.w3.org/2000/svg","g");
      g.classList.add("slice");
      g.setAttribute("tabindex","0");
      g.setAttribute("role","button");
      g.setAttribute("aria-label", months[i]);
      g.setAttribute("data-month-index", String(i));
      g.setAttribute("aria-selected","false");

      const path = document.createElementNS("http://www.w3.org/2000/svg","path");
      path.setAttribute("d", describeArc(cx,cy,rOuter,rInner,start,end));
      path.setAttribute("fill", sliceFills[i % sliceFills.length]);
      path.setAttribute("stroke","rgba(15,23,42,0.14)");
      path.setAttribute("stroke-width","1");
      g.appendChild(path);

      const mid = start + sliceAngle/2;
      const labelPos = polarToCartesian(cx,cy,(rOuter+rInner)/2,mid);
      const txt = document.createElementNS("http://www.w3.org/2000/svg","text");
      txt.classList.add("monthLabel");
      txt.setAttribute("x", labelPos.x);
      txt.setAttribute("y", labelPos.y);
      txt.setAttribute("text-anchor","middle");
      txt.setAttribute("dominant-baseline","middle");
      txt.textContent = months[i].slice(0,3).toUpperCase();
      g.appendChild(txt);

      g.addEventListener("click", () => selectMonth(i));
      g.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectMonth(i); }
      });

      svg.appendChild(g);
    }

    const center = document.createElementNS("http://www.w3.org/2000/svg","circle");
    center.setAttribute("cx",cx); center.setAttribute("cy",cy); center.setAttribute("r", rInner - 18);
    center.setAttribute("class","centerDot");
    svg.appendChild(center);

    const centerText = document.createElementNS("http://www.w3.org/2000/svg","text");
    centerText.setAttribute("x",cx); centerText.setAttribute("y",cy);
    centerText.setAttribute("text-anchor","middle"); centerText.setAttribute("dominant-baseline","middle");
    centerText.setAttribute("fill","rgba(15,23,42,0.85)");
    centerText.setAttribute("font-size","18"); centerText.setAttribute("font-weight","900");
    centerText.textContent = "2026";
    svg.appendChild(centerText);
  }

  function setSelectedSlice(i) {
    els.wheel.querySelectorAll(".slice").forEach(s => s.setAttribute("aria-selected","false"));
    const sel = els.wheel.querySelector('.slice[data-month-index="' + i + '"]');
    if (sel) sel.setAttribute("aria-selected","true");
  }

  function selectMonth(i) {
    selectedMonthIndex = i;
    setSelectedSlice(i);
    els.panelTitle.textContent = months[i];
    els.panelSub.textContent = "Aktiviteter för vald månad.";
    render();
  }

  function pill(text) {
    const s = document.createElement("span");
    s.className = "pill";
    s.textContent = text;
    return s;
  }

  function render() {
    const q = els.q.value.trim().toLowerCase();
    const globalSearch = q.length > 0;

    let rows = globalSearch ? allRows.slice() : (selectedMonthIndex === null ? [] : allRows.filter(r => r.monthIndex === selectedMonthIndex));

    if (q) {
      rows = rows.filter(r =>
        (r.title||"").toLowerCase().includes(q) ||
        (r.desc||"").toLowerCase().includes(q) ||
        (r.place||"").toLowerCase().includes(q) ||
        (r.category||"").toLowerCase().includes(q) ||
        (r.date||"").toLowerCase().includes(q) ||
        (months[r.monthIndex]||"").toLowerCase().includes(q)
      );
    }

    els.list.innerHTML = "";
    els.countPill.style.display = "inline-flex";
    els.countPill.textContent = rows.length + " st";

    if (rows.length === 0) {
      els.list.innerHTML = '<div class="empty">' + (globalSearch ? 'Inget hittades.' : 'Välj en månad i hjulet eller sök för att se alla aktiviteter.') + '</div>';
      return;
    }

    rows = rows.slice().sort((a,b) => {
      if (globalSearch) {
        if (a.monthIndex !== b.monthIndex) return a.monthIndex - b.monthIndex;
      }
      const ad = (a.date||"").toLowerCase(), bd = (b.date||"").toLowerCase();
      if (ad < bd) return -1;
      if (ad > bd) return 1;
      return (a.title||"").localeCompare(b.title||"", "sv");
    });

    for (const r of rows) {
      const card = document.createElement("div");
      card.className = "card";

      const top = document.createElement("div");
      top.className = "cardTop";

      const h = document.createElement("p");
      h.className = "cardTitle";
      h.textContent = r.title || "(utan rubrik)";
      top.appendChild(h);

      const btns = document.createElement("div");
      btns.className = "btnGroup";

      const edit = document.createElement("button");
      edit.className = "ghostBtn";
      edit.type = "button";
      edit.textContent = "Redigera";
      edit.title = "Redigera aktivitet";
      edit.addEventListener("click", () => {
        openModal("edit", r);
      });
      btns.appendChild(edit);

      const del = document.createElement("button");
      del.className = "dangerBtn";
      del.type = "button";
      del.textContent = "Radera";
      del.title = "Radera aktivitet";
      del.addEventListener("click", async () => {
        if (!r.row) {
          alert("Kan inte radera: __row saknas i datat. Uppdatera doGet så att den skickar __row.");
          return;
        }
        const monthName = months[r.monthIndex] || "";
        const label = (r.title ? r.title : "aktiviteten") + (monthName ? (" (" + monthName + ")") : "");
        if (!confirm("Radera " + label + "?")) return;

        try {
          setStatus("Raderar…");
          await deleteActivity({ row: r.row });
          await loadData();
          setStatus("Raderat");
        } catch (e) {
          console.error(e);
          setStatus("Kunde inte radera");
          alert("Kunde inte radera. Kolla att Apps Script stödjer delete (doPost).");
        }
      });
      btns.appendChild(del);

      top.appendChild(btns);

      card.appendChild(top);

      const meta = document.createElement("div");
      meta.className = "meta";
      if (globalSearch) meta.appendChild(pill(months[r.monthIndex]));
      if (r.date) meta.appendChild(pill(formatDate(r.date)));
      if (r.place) meta.appendChild(pill(r.place));
      if (r.category) meta.appendChild(pill(r.category));
      card.appendChild(meta);

      if (r.desc) {
        const d = document.createElement("p");
        d.className = "desc";
        d.textContent = r.desc;
        card.appendChild(d);
      }

      els.list.appendChild(card);
    }
  }

  function wireUI() {
    els.q.addEventListener("input", () => {
      const q = els.q.value.trim();
      if (q) {
        els.panelTitle.textContent = "Sökresultat";
        els.panelSub.textContent = "Träffar i alla månader (månad visas på varje aktivitet).";
      } else {
        if (selectedMonthIndex === null) {
          els.panelTitle.textContent = "Välj en månad";
          els.panelSub.textContent = "Sök i rutan för att hitta aktiviteter i alla månader eller välj en månad i hjulet.";
        } else {
          els.panelTitle.textContent = months[selectedMonthIndex];
          els.panelSub.textContent = "Aktiviteter för vald månad.";
        }
      }
      render();
    });

    els.clearBtn.addEventListener("click", () => {
      els.q.value = "";
      els.q.focus();
      if (selectedMonthIndex === null) {
        els.panelTitle.textContent = "Välj en månad";
        els.panelSub.textContent = "Sök i rutan för att hitta aktiviteter i alla månader eller välj en månad i hjulet.";
      } else {
        els.panelTitle.textContent = months[selectedMonthIndex];
        els.panelSub.textContent = "Aktiviteter för vald månad.";
      }
      render();
    });

    els.addBtn.addEventListener("click", () => {
      els.panelTitle.textContent = "Ny aktivitet";
      els.panelSub.textContent = "Fyll i och spara. Aktiviteten hamnar i Blad1.";
      openModal("add");
    });

    els.closeModalBtn.addEventListener("click", closeModal);
    els.cancelBtn.addEventListener("click", closeModal);
    els.modalBackdrop.addEventListener("click", (e) => {
      if (e.target === els.modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && els.modalBackdrop.getAttribute("aria-hidden") === "false") closeModal();
    });

    els.addForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const m = (els.fMonth.value || "").trim();
      const monthNum = Number(m);
      if (!Number.isFinite(monthNum) || monthNum < 1 || monthNum > 12) {
        els.saveStatus.textContent = "Månad måste vara 1–12.";
        return;
      }

      const payload = {
        row: Number(els.fRow.value || 0) || 0,
        manad: monthNum,
        rubrik: (els.fTitle.value || "").trim(),
        datum: (els.fDate.value || "").trim(),
        beskrivning: (els.fDesc.value || "").trim(),
        plats: (els.fPlace.value || "").trim(),
        kategori: (els.fCat.value || "").trim(),
      };

      if (!payload.rubrik) {
        els.saveStatus.textContent = "Rubrik krävs.";
        return;
      }

      try {
        const mode = els.fMode.value || "add";

        if (mode === "edit") {
          if (!payload.row) {
            els.saveStatus.textContent = "Kan inte spara: __row saknas. Ladda om sidan och prova igen.";
            return;
          }
          els.saveStatus.textContent = "Sparar ändring…";
          await updateActivity(payload);
        } else {
          els.saveStatus.textContent = "Sparar…";
          await addActivity(payload);
        }

        els.saveStatus.textContent = "Sparat. Uppdaterar…";
        await loadData();
        closeModal();
        selectMonth(monthNum - 1);
      } catch (err) {
        console.error(err);
        els.saveStatus.textContent = "Kunde inte spara. Kontrollera att webbappen har åtkomst 'Alla'.";
      }
    });
  }

  async function init() {
    buildWheel();
    wireUI();
    await loadData();
    selectMonth(new Date().getMonth());
  }

  init();
})();
</script>
</body>
</html>
